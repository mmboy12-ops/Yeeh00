<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Helwyr Hunter Pro</title>
    <script src="https://runeapps.org/alt1lib.js"></script>
    <style>
        body { 
            background: #121212; color: #f1c40f; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 15px; text-align: center;
            border-top: 4px solid #f1c40f;
        }
        .box { background: #1e1e1e; padding: 12px; border-radius: 8px; margin: 10px 0; border: 1px solid #d35400; }
        .label { color: #888; font-size: 0.7em; text-transform: uppercase; }
        .value { display: block; font-size: 1.2em; font-weight: bold; color: #fff; }
        #status-light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; margin-right: 5px; }
    </style>
</head>
<body>
    <div style="font-weight: bold; margin-bottom: 10px;">HELWYR HUNTER PRO</div>
    
    <div class="box">
        <span class="label">Next Attack</span>
        <span id="next-attack" class="value">Ready...</span>
    </div>

    <div class="box">
        <span class="label">Defense</span>
        <span id="defense" class="value" style="color: #3498db;">---</span>
    </div>

    <div style="font-size: 0.8em; margin-top: 10px;">
        <span id="status-light"></span> <span id="status-text">Screen Access: Denied</span>
    </div>

    <script>
        const rotation = [
            { name: "Cleave", advice: "Resonance / Shield" },
            { name: "Frenzy", advice: "Devotion / Freedom" },
            { name: "Thrash", advice: "Soul Split / DPS" },
            { name: "Howl", advice: "Move Away" },
            { name: "Cyrets", advice: "AoE Attacks" }
        ];
        let current = 0;
        let lastTrigger = 0;

        function main() {
            if (window.alt1 && alt1.permissionScreen) {
                document.getElementById("status-light").style.background = "#2ecc71";
                document.getElementById("status-text").innerText = "Screen Access: Active";
                
                let img = alt1.capture(alt1.rsX, alt1.rsY, alt1.rsWidth, alt1.rsHeight);
                if (!img) return;

                let yellow = 0;
                for (let i = 0; i < img.data.length; i += 4) {
                    if (img.data[i] > 200 && img.data[i+1] > 180 && img.data[i+2] < 100) yellow++;
                }

                if (yellow > 30 && (Date.now() - lastTrigger > 3000)) {
                    lastTrigger = Date.now();
                    let step = rotation[current];
                    document.getElementById("next-attack").innerText = step.name;
                    document.getElementById("defense").innerText = step.advice;

                    if (alt1.permissionOverlay) {
                        const m = alt1.mousePosition;
                        if (m) {
                            alt1.overLaySetGroup("helwyr");
                            alt1.overLayTextEx("⚠️ "+step.name+"\n🛡️ "+step.advice, 255, 215, 0, m.x+25, m.y+25, 18, "sans-serif", true, 3000);
                        }
                    }
                    current = (current + 1) % rotation.length;
                }
            }
        }
        setInterval(main, 400);
    </script>
</body>
</html>
